<style>

    padding:10px;

}
</style>
</head>

<body>

<div class="container">

<h2>📊 Relatórios</h2>

<!-- FILTROS -->
<div class="filtros">

<button onclick="setPeriodo('hoje')">Hoje</button>
<button onclick="setPeriodo('ontem')">Ontem</button>
<button onclick="setPeriodo('7')">7 dias</button>
<button onclick="setPeriodo('30')">30 dias</button>

    <br><br>

<label>Período:</label><br>

<input type="date" id="dataInicio">
<input type="date" id="dataFim">

    </select>

<select id="filtroPlano">
    <option value="">Todos Planos</option>
</select>

</div>

<!-- TABELAS -->
<div class="tables-container">
    <div class="table-box">
        <h3>👨‍🔧 Técnicos</h3>
        <table id="tabelaTecnicos"><tbody></tbody></table>
    </div>

    <div class="table-box">
        <h3>📍 Localidades</h3>
        <table id="tabelaLocalidades"><tbody></tbody></table>
    </div>

    <div class="table-box">
        <h3>🛠️ Tipos</h3>
        <table id="tabelaTipos"><tbody></tbody></table>
    </div>
</div>

<!-- GRÁFICOS -->
<div class="charts-container">

    <div class="chart-box">
        <h3>👨‍🔧 Técnicos</h3>
        <canvas id="chartTecnicos"></canvas>
    </div>

    <div class="chart-box">
        <h3>📍 Localidades</h3>
        <canvas id="chartLocalidades"></canvas>
    </div>

    <div class="chart-box">
        <h3>🛠️ Tipos</h3>
        <canvas id="chartTipos"></canvas>
    </div>

</div>

<script>

let periodo = "hoje";
let dataInicio = null;
let dataFim = null;
let cache = null;
let charts = {};
let dadosFiltrados = [];

// 🔥 mapa de planos por empresa
let mapaPlanos = {};

let filtros = {
    data: null,
    tecnico: "",
    localidade: "",
    tipo: "",
    plano: "",
    status: ""
};

// ===============================
// 🔥 SET PERÍODO
// ===============================
function setPeriodo(tipo){

    periodo = tipo;

    filtros.data = null;

    if(tipo === "personalizado"){
        dataInicio = document.getElementById("dataInicio").value;
        dataFim = document.getElementById("dataFim").value;
    } else {
        dataInicio = null;
        dataFim = null;
    }

    aplicarFiltros();
}

// ===============================
// 🔥 APLICAR FILTROS (CORRIGIDO)
// ===============================
function aplicarFiltros(){

    filtros.tecnico = document.getElementById("filtroTecnico").value;
    filtros.localidade = document.getElementById("filtroLocalidade").value;
    filtros.tipo = document.getElementById("filtroTipo").value;
    filtros.plano = document.getElementById("filtroPlano").value;
    filtros.status = document.getElementById("filtroStatus").value;

    carregar();
}

// ===============================
function limparFiltros(){

    filtros = { data:null, tecnico:"", localidade:"", tipo:"", plano:"", status:"" };

    document.getElementById("filtroTecnico").value = "";
    document.getElementById("filtroLocalidade").value = "";
    document.getElementById("filtroTipo").value = "";
    document.getElementById("filtroPlano").value = "";
    document.getElementById("filtroStatus").value = "";

    carregar();
}

// ===============================
function getData(o){
    let data = o.finalizado_em || o.agendamento || o.data_abertura;
    if(!data) return null;
    const d = new Date(data);
    if(isNaN(d.getTime())) return null;
    return d;
}

// ===============================
function filtroData(d){

    const data = new Date(d);

    // HOJE
    if(periodo === "hoje"){
        const hoje = new Date();
        hoje.setHours(0,0,0,0);

        const dt = new Date(data);
        dt.setHours(0,0,0,0);

        return dt.getTime() === hoje.getTime();
    }

    // ONTEM
    if(periodo === "ontem"){
        const ontem = new Date();
        ontem.setDate(ontem.getDate() - 1);
        ontem.setHours(0,0,0,0);

        const dt = new Date(data);
        dt.setHours(0,0,0,0);

        return dt.getTime() === ontem.getTime();
    }

    // PERSONALIZADO
    if(periodo === "personalizado"){
        if(!dataInicio || !dataFim) return true;

        const inicio = new Date(dataInicio);
        const fim = new Date(dataFim);

        inicio.setHours(0,0,0,0);
        fim.setHours(23,59,59,999);

        return data >= inicio && data <= fim;
    }

    return true;
}

// ===============================
function gerarCores(qtd){
    return Array.from({length:qtd}, (_,i)=>`hsl(${i*360/qtd},70%,50%)`);
}

// ===============================
function renderChart(id, type, labels, data){

    if(charts[id]) charts[id].destroy();

    charts[id] = new Chart(document.getElementById(id), {
        type,
        data:{
            labels,
            datasets:[{
                data,
                backgroundColor: gerarCores(labels.length)
            }]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false
        }
    });
}

// ===============================
// 🔥 CARREGAR DADOS (CORRIGIDO FINAL)
// ===============================
async function carregar(){

    try{

        const usuario = JSON.parse(localStorage.getItem("usuario") || "{}");

        if(!usuario.id){
            console.error("Usuário não encontrado");
            return;
        }

        // ===============================
        // 🔥 RELATÓRIOS
        // ===============================
        if(!cache){
            const res = await fetch("/api/relatorios", {
                headers:{ "x-usuario-id": usuario.id }
            });

            cache = await res.json();

            if(!Array.isArray(cache)){
                console.error("API não retornou array:", cache);
                cache = [];
            }
        }

        // ===============================
        // 🔥 PLANOS
        // ===============================
        if(!window.planosCarregados){

            const res = await fetch("/api/planos", {
                headers:{ "x-usuario-id": usuario.id }
            });

            const planos = await res.json();

            mapaPlanos = {};

            (planos || []).forEach(p=>{
                mapaPlanos[String(p.id)] = p.nome;
            });

            window.planosCarregados = true;
        }

        // ===============================
        // 🔥 FILTROS (SELECTS)
        // ===============================
        if(!window.filtrosCarregados){

            const tecnicosSet = new Set();
            const localidadesSet = new Set();
            const tiposSet = new Set();
            const planosSet = new Set();

            cache.forEach(o=>{

                if(!o) return;

                // técnicos
                if(o.tecnico){
                    let lista = [];
                    try{ lista = JSON.parse(o.tecnico); }
                    catch{ lista = [o.tecnico]; }

                    lista = [...new Set(lista)];

                    lista.forEach(t=>{
                        if(!t) return;
                        if(typeof t === "number") return;
                        if(!isNaN(t)) return;

                        tecnicosSet.add(String(t).trim());
                    });
                }

                // localidades
                if(o.nome_localidade && isNaN(o.nome_localidade)){
                    localidadesSet.add(String(o.nome_localidade).trim());
                }

                // tipos
                if(o.nome_tipo_servico && isNaN(o.nome_tipo_servico)){
                    tiposSet.add(String(o.nome_tipo_servico).trim());
                }

                // planos
                if(o.plano){
                    const nome = mapaPlanos[String(o.plano)] || o.plano;

                    if(nome && isNaN(nome)){
                        planosSet.add(String(nome).trim());
                    }
                }

            });

            const preencher = (id, lista)=>{
                const el = document.getElementById(id);
                if(!el) return;

                el.innerHTML = `<option value="">Todos</option>`;

                lista.sort((a,b)=>a.localeCompare(b))
                     .forEach(v=>{
                        el.innerHTML += `<option value="${v}">${v}</option>`;
                     });
            };

            preencher("filtroTecnico", [...tecnicosSet]);
            preencher("filtroLocalidade", [...localidadesSet]);
            preencher("filtroTipo", [...tiposSet]);
            preencher("filtroPlano", [...planosSet]);

            window.filtrosCarregados = true;
        }

        // ===============================
        // 🔥 FILTRAGEM (AGORA NO LUGAR CERTO)
        // ===============================
        dadosFiltrados = cache.filter(o => {

            if(!o) return false;

            if(o.status === "em_andamento") return false;

            // data
            if(filtros.status === "abertas"){
                if(!o.data_abertura) return false;
                const d = new Date(o.data_abertura);
                if(isNaN(d) || !filtroData(d)) return false;
            }
            else if(filtros.status === "concluidas"){
                if(!o.finalizado_em) return false;
                const d = new Date(o.finalizado_em);
                if(isNaN(d) || !filtroData(d)) return false;
            }
            else{
                const d = getData(o);
                if(!d || !filtroData(d)) return false;
            }

            // técnico
            if(filtros.tecnico){
                let lista = [];
                try{ lista = JSON.parse(o.tecnico); }
                catch{ lista = [o.tecnico]; }

                lista = lista.filter(t => t && isNaN(t));
                if(!lista.includes(filtros.tecnico)) return false;
            }

            // localidade
            if(filtros.localidade && o.nome_localidade !== filtros.localidade)
                return false;

            // tipo
            if(filtros.tipo && o.nome_tipo_servico !== filtros.tipo)
                return false;

            // plano
            if(filtros.plano){
                const nomePlano = mapaPlanos[String(o.plano)] || o.plano;
                if(nomePlano !== filtros.plano) return false;
            }

            return true;
        });

        // ===============================
        // 🔥 RANKING
        // ===============================
        const tecnicos = {};
        const localidades = {};
        const tipos = {};

        dadosFiltrados.forEach(o => {

            if(o.tecnico){
                let lista = [];
                try{ lista = JSON.parse(o.tecnico); }
                catch{ lista = [o.tecnico]; }

                lista = [...new Set(lista)].filter(t => t && isNaN(t));

                lista.forEach(t=>{
                    tecnicos[t] = (tecnicos[t] || 0) + 1;
                });
            }

            if(o.nome_localidade)
                localidades[o.nome_localidade] = (localidades[o.nome_localidade]||0)+1;

            if(o.nome_tipo_servico)
                tipos[o.nome_tipo_servico] = (tipos[o.nome_tipo_servico]||0)+1;
        });

        // ===============================
        // 🔥 TABELAS
        // ===============================
        const renderTabela = (id,obj)=>{
            const el = document.querySelector(`#${id} tbody`);
            if(!el) return;

            el.innerHTML = Object.entries(obj)
                .sort((a,b)=>b[1]-a[1])
                .map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`)
                .join("");
        };

        renderTabela("tabelaTecnicos", tecnicos);
        renderTabela("tabelaLocalidades", localidades);
        renderTabela("tabelaTipos", tipos);

        // ===============================
        // 🔥 GRÁFICOS
        // ===============================
        renderChart("chartTecnicos","bar",
            Object.keys(tecnicos),
            Object.values(tecnicos)
        );

        renderChart("chartLocalidades","doughnut",
            Object.keys(localidades),
            Object.values(localidades)
        );

        renderChart("chartTipos","doughnut",
            Object.keys(tipos),
            Object.values(tipos)
        );

// 🔥 GRÁFICO DE LINHA
const { resumo } = gerarResumoPeriodo(dadosFiltrados);

const labels = Object.keys(resumo);
const abertasData = labels.map(d => resumo[d].abertas);
const concluidasData = labels.map(d => resumo[d].concluidas);

renderChart("chartAbertas","line", labels, abertasData);
renderChart("chartConcluidas","line", labels, concluidasData);

} catch(err){
    console.error("Erro no carregar:", err);
}
}

// ===============================
// 🔥 RESUMO POR PERÍODO (GRÁFICO LINHA)
// ===============================
function gerarResumoPeriodo(lista){

    const resumo = {};

    const hoje = new Date();
    hoje.setHours(0,0,0,0);

    let inicio = new Date(hoje);
    let fim = new Date(hoje);

    if(periodo === "ontem"){
        inicio.setDate(inicio.getDate() - 1);
        fim = new Date(inicio);
    }

    if(periodo === "7"){
        inicio.setDate(inicio.getDate() - 6);
    }

    if(periodo === "30"){
        inicio.setDate(inicio.getDate() - 29);
    }

    if(periodo === "personalizado" && dataInicio && dataFim){
        inicio = new Date(dataInicio);
        fim = new Date(dataFim);
    }

    // cria todos os dias
    for(let d = new Date(inicio); d <= fim; d.setDate(d.getDate()+1)){
        const key = d.toISOString().split("T")[0];
        resumo[key] = { abertas:0, concluidas:0 };
    }

    lista.forEach(o=>{

        if(o.data_abertura){
            const d = new Date(o.data_abertura);
            const key = d.toISOString().split("T")[0];
            if(resumo[key]) resumo[key].abertas++;
        }

        if(o.finalizado_em){
            const d = new Date(o.finalizado_em);
            const key = d.toISOString().split("T")[0];
            if(resumo[key]) resumo[key].concluidas++;
        }

    });

    return { resumo };
}

// ===============================
// 🔥 GERAR PDF RELATÓRIO COMPLETO FINAL (LOGO AJUSTADA SEM QUEBRAR LAYOUT)
// ===============================
async function gerarPDFRelatorio(){

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const usuario = JSON.parse(localStorage.getItem("usuario") || "{}");

    let empresa = {};

    try{
        const res = await fetch("/api/empresa", {
            headers:{ "x-usuario-id": usuario.id }
        });
        empresa = await res.json();
    }catch(e){
        console.error("Erro empresa:", e);
    }

    // ===============================
    // 🔥 BUSCAR PLANOS
    // ===============================
    let mapaPlanos = {};

    try{
        const res = await fetch("/api/planos", {
            headers:{ "x-usuario-id": usuario.id }
        });

        const listaPlanos = await res.json();

        listaPlanos.forEach(p=>{
            mapaPlanos[p.id] = p.nome || p.nome_plano || p.descricao;
        });

    }catch(e){
        console.error("Erro ao buscar planos:", e);
    }

    // ===============================
    // 🔥 LOGO
    // ===============================
    async function carregarLogoBase64(url){
        try{
            if(!url.startsWith("http")){
                url = window.location.origin + "/uploads/" + url;
            }

            const res = await fetch(url);
            if(!res.ok) throw new Error("Logo não encontrada");

            const blob = await res.blob();

            return await new Promise(resolve=>{
                const reader = new FileReader();
                reader.onloadend = ()=> resolve(reader.result);
                reader.readAsDataURL(blob);
            });

        }catch(e){
            console.warn("Logo não carregada:", e.message);
            return null;
        }
    }

    let logo = empresa.logo ? await carregarLogoBase64(empresa.logo) : null;

    // ===============================
    // 🔥 HEADER (SEM INTERFERIR NO LAYOUT)
    // ===============================
    let y = 15;

    const logoX = 160;
    const logoY = 8;
    const maxWidth = 40;
    const maxHeight = 20;

    if(logo){

        const img = new Image();
        img.src = logo;

        await new Promise(resolve => {
            img.onload = resolve;
        });

        let width = img.width;
        let height = img.height;

        const ratio = Math.min(maxWidth / width, maxHeight / height);

        width *= ratio;
        height *= ratio;

        doc.addImage(logo, "PNG", logoX, logoY, width, height);
    }

    doc.setFont("helvetica","bold");
    doc.setFontSize(13);
    doc.text(empresa.nome_provedor || empresa.nome_fantasia || "EMPRESA", 10, y);

    y += 6;

    doc.setFont("helvetica","normal");
    doc.setFontSize(9);

    doc.text(`CNPJ/CPF: ${empresa.cnpj || empresa.cpf || "-"}`, 10, y); y+=5;
    doc.text(`Telefone: ${empresa.telefone || "-"}`, 10, y); y+=5;
    if(empresa.email) doc.text(`Email: ${empresa.email}`, 10, y), y+=5;
    if(empresa.endereco) doc.text(`Endereço: ${empresa.endereco}`, 10, y), y+=5;

    // ===============================
    // 🔥 PERÍODO
    // ===============================
    const formatarData = (d)=>{
        if(!d) return "";
        const data = new Date(d);
        return data.toLocaleDateString("pt-BR", { timeZone: "UTC" });
    };

    let textoPeriodo = "";

    if(periodo === "personalizado" && dataInicio && dataFim){
        textoPeriodo = `${formatarData(dataInicio)} - ${formatarData(dataFim)}`;
    }
    else if(periodo === "7"){
        const fim = new Date();
        const inicio = new Date();
        inicio.setDate(fim.getDate() - 6);
        textoPeriodo = `${formatarData(inicio)} - ${formatarData(fim)}`;
    }
    else if(periodo === "30"){
        const fim = new Date();
        const inicio = new Date();
        inicio.setDate(fim.getDate() - 29);
        textoPeriodo = `${formatarData(inicio)} - ${formatarData(fim)}`;
    }
    else if(periodo === "ontem"){
        const d = new Date();
        d.setDate(d.getDate() - 1);
        textoPeriodo = formatarData(d);
    }
    else{
        textoPeriodo = formatarData(new Date());
    }

    doc.text(`Período: ${textoPeriodo}`, 10, y); y+=5;
    doc.text(`Gerado em: ${new Date().toLocaleString("pt-BR")}`, 10, y);

    y += 10;

    // ===============================
    // 🔥 TÍTULO AZUL
    // ===============================
    function tituloAzul(texto){
        if(y > 270){
            doc.addPage();
            y = 20;
        }

        doc.setFillColor(0,102,204);
        doc.rect(10, y-5, 190, 8, "F");

        doc.setTextColor(255,255,255);
        doc.setFont("helvetica","bold");
        doc.text(texto, 12, y);

        doc.setTextColor(0,0,0);
        doc.setFont("helvetica","normal");

        y += 8;
    }

    // ===============================
    // 🔥 AGRUPAMENTO
    // ===============================
    function agrupar(lista, campo){

        const obj = {};

        lista.forEach(o=>{

            if(campo === "tecnico"){
                let listaTec = [];
                try{ listaTec = JSON.parse(o.tecnico); }
                catch{ listaTec = [o.tecnico]; }

                listaTec = listaTec.filter(t => t && isNaN(t));

                listaTec.forEach(t=>{
                    if(!obj[t]) obj[t]={ abertas:0, concluidas:0 };
                    if(o.data_abertura) obj[t].abertas++;
                    if(o.finalizado_em) obj[t].concluidas++;
                });

                return;
            }

            const chave = o[campo] || "Não informado";

            if(!obj[chave]) obj[chave]={ abertas:0, concluidas:0 };

            if(o.data_abertura) obj[chave].abertas++;
            if(o.finalizado_em) obj[chave].concluidas++;
        });

        return obj;
    }

    // ===============================
    // 🔥 TABELA
    // ===============================
    function desenharTabela(obj, mostrarTotal=true){

        let totalA = 0;
        let totalC = 0;

        doc.text("Descrição", 10, y);
        doc.text("Abertas", 140, y);
        doc.text("Concluídas", 170, y);
        y += 5;

        Object.entries(obj)
        .sort((a,b)=>(b[1].abertas+b[1].concluidas)-(a[1].abertas+a[1].concluidas))
        .forEach(([k,v])=>{

            if(y > 270){
                doc.addPage();
                y = 20;
            }

            doc.text(String(k).substring(0,40), 10, y);
            doc.text(String(v.abertas), 140, y);
            doc.text(String(v.concluidas), 170, y);

            totalA += v.abertas;
            totalC += v.concluidas;

            y += 5;
        });

        if(mostrarTotal){
            doc.setFont("helvetica","bold");
            doc.text("TOTAL", 10, y);
            doc.text(String(totalA), 140, y);
            doc.text(String(totalC), 170, y);
            doc.setFont("helvetica","normal");
            y += 6;
        }

        y += 5;
    }

    // ===============================
    // 🔥 BLOCOS
    // ===============================
    tituloAzul("TÉCNICOS");
    desenharTabela(agrupar(dadosFiltrados,"tecnico"), false);

    tituloAzul("LOCALIDADES");
    desenharTabela(agrupar(dadosFiltrados,"nome_localidade"), true);

    tituloAzul("TIPOS DE SERVIÇO");
    desenharTabela(agrupar(dadosFiltrados,"nome_tipo_servico"), true);

    // ===============================
    // 🔥 INSTALAÇÕES
    // ===============================
    const instalacoes = {};

    dadosFiltrados.forEach(o=>{
        if(o.nome_tipo_servico?.toLowerCase().includes("instala")){
            const loc = o.nome_localidade || "SEM LOCAL";

            if(!instalacoes[loc]) instalacoes[loc]={ abertas:0, concluidas:0 };

            if(o.data_abertura) instalacoes[loc].abertas++;
            if(o.finalizado_em) instalacoes[loc].concluidas++;
        }
    });

    tituloAzul("INSTALAÇÕES (COMODATO) POR LOCALIDADE");
    desenharTabela(instalacoes, true);

    // ===============================
    // 🔥 PLANOS
    // ===============================
    tituloAzul("PLANOS POR LOCALIDADE");

    function getVelocidade(plano){
        const match = String(plano).match(/\d+/);
        return match ? parseInt(match[0]) : 0;
    }

    function getNomePlano(o){
        if(o.nome_plano && isNaN(o.nome_plano)) return o.nome_plano;
        if(mapaPlanos[o.plano]) return mapaPlanos[o.plano];
        return null;
    }

    const estrutura = {};

    dadosFiltrados.forEach(o=>{

        if(!o.nome_tipo_servico?.toLowerCase().includes("instala")) return;

        const nomePlano = getNomePlano(o);
        if(!nomePlano) return;

        const plano = nomePlano.toUpperCase();
        const loc = (o.nome_localidade || "SEM LOCAL").toUpperCase();

        if(!estrutura[plano]) estrutura[plano] = {};
        if(!estrutura[plano][loc]) estrutura[plano][loc] = 0;

        estrutura[plano][loc]++;
    });

    Object.keys(estrutura)
    .sort((a,b)=> getVelocidade(a) - getVelocidade(b))
    .forEach(plano=>{

        let totalPlano = 0;

        Object.entries(estrutura[plano])
        .sort((a,b)=> b[1] - a[1])
        .forEach(([loc,qtd])=>{

            if(y > 270){
                doc.addPage();
                y = 20;
            }

            doc.text(plano, 10, y);
            doc.text(loc, 110, y);
            doc.text(`(${qtd})`, 170, y);

            totalPlano += qtd;

            y += 5;
        });

        y += 2;

        doc.setFont("helvetica","bold");
        doc.text(`TOTAL = ${plano}`, 10, y);
        doc.text(`(${totalPlano})`, 170, y);
        doc.setFont("helvetica","normal");

        y += 8;
    });

    return doc.output("datauristring");
}

// ===============================
// 🔥 EXPORTAR PDF
// ===============================
async function exportarPDF(){
    try{

        const base64 = await gerarPDFRelatorio();

        const base64Clean = base64.replace(/^data:application\/pdf.*base64,/, "");

        const byteCharacters = atob(base64Clean);
        const byteNumbers = [];

        for (let i = 0; i < byteCharacters.length; i++) {
            byteNumbers.push(byteCharacters.charCodeAt(i));
        }

        const blob = new Blob([new Uint8Array(byteNumbers)], {
            type: "application/pdf"
        });

        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "relatorio.pdf";
        a.click();

        URL.revokeObjectURL(url);

    }catch(err){
        console.error("ERRO PDF:", err);
        alert("Erro ao exportar PDF");
    }
}


// ===============================
// 🔥 ENVIAR RELATÓRIO
// ===============================
async function enviarRelatorioManual(){

    try{

        const email = document.getElementById("emailEnvio")?.value;

        if(!email){
            alert("Informe um e-mail");
            return;
        }

        const usuario = JSON.parse(localStorage.getItem("usuario") || "{}");

        const res = await fetch("/api/relatorios/enviar-manual", {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "x-usuario-id": usuario.id
            },
            body: JSON.stringify({
                email,
                pdfBase64: await gerarPDFRelatorio()
            })
        });

        const data = await res.json();

        if(data.ok){
            alert("📧 Enviado com sucesso!");
        }else{
            alert("Erro ao enviar");
        }

    }catch(err){
        console.error("Erro envio:", err);
        alert("Erro ao enviar relatório");
    }
}

// ===============================
// 🔥 EXPORTAR XML
// ===============================
function exportarXML(){

    try{

        let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<relatorio>\n`;

        dadosFiltrados.forEach(o=>{

            xml += `
<os>
    <tipo>${o.nome_tipo_servico || ""}</tipo>
    <localidade>${o.nome_localidade || ""}</localidade>
    <tecnico>${o.tecnico || ""}</tecnico>
    <data>${o.finalizado_em || ""}</data>
</os>`;
        });

        xml += `\n</relatorio>`;

        const blob = new Blob([xml], { type: "application/xml" });

        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "relatorio.xml";
        a.click();

    } catch(err){
        console.error(err);
        alert("Erro ao gerar XML");
    }
}

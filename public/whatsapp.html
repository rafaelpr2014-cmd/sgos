<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>WhatsApp - SDOS</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: #1e293b;
    padding: 30px;
    border-radius: 16px;
    width: 350px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2 {
    margin-bottom: 20px;
}

button {
    background: #22c55e;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #16a34a;
}

#qr canvas {
    margin-top: 20px;
}

.status {
    margin-top: 15px;
    padding: 10px;
    border-radius: 8px;
    background: #334155;
}

.conectado {
    color: #22c55e;
}

.desconectado {
    color: #ef4444;
}
</style>
</head>

<body>

<div class="container">
    <h2>📲 Conectar WhatsApp</h2>

    <button onclick="conectar()">Conectar</button>

    <div id="qr"></div>

    <div id="status" class="status">Status: aguardando</div>
</div>

<script>
const empresaId = 1;

// gerar QR corretamente
async function conectar() {
    const res = await fetch(`/api/whatsapp/qr/${empresaId}`);
    const data = await res.json();

    document.getElementById('qr').innerHTML = "";

    QRCode.toCanvas(data.qr, { width: 250 }, function (err, canvas) {
        if (err) return console.error(err);
        document.getElementById('qr').appendChild(canvas);
    });
}

// verificar status
setInterval(async () => {
    const res = await fetch(`/api/whatsapp/status/${empresaId}`);
    const data = await res.json();

    const statusEl = document.getElementById('status');

    statusEl.innerText = "Status: " + data.status;

    statusEl.className = "status " + (
        data.status === "conectado" ? "conectado" : "desconectado"
    );

}, 3000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Empresas - SDOS</title>

<script src="/js/init.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
}

.container {
    padding:20px;
}

.card {
    background:white;
    padding:25px;
    border-radius:10px;
    max-width:700px;
    margin:auto;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

h2 { margin-bottom:20px; }

input, select {
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:12px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover { background:#2980b9; }

.radio-group {
    display:flex;
    gap:20px;
    margin-bottom:15px;
}

.section-title {
    margin-top:15px;
    font-weight:bold;
}

.logo-preview img {
    width:80px;
    margin-top:10px;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2 id="titulo">Cadastro de Empresa</h2>

<div class="radio-group">
    <label><input type="radio" name="tipo" value="fisica"> Pessoa Física</label>
    <label><input type="radio" name="tipo" value="juridica"> Pessoa Jurídica</label>
</div>

<div id="boxFisica" style="display:none;">
    <div class="section-title">Pessoa Física</div>
    <input type="text" id="cpf" placeholder="CPF">
    <input type="text" id="nome_completo" placeholder="Nome Completo">
    <input type="text" id="nome_provedor" placeholder="Nome do provedor">
</div>

<div id="boxJuridica" style="display:none;">
    <div class="section-title">Pessoa Jurídica</div>
    <input type="text" id="cnpj" placeholder="CNPJ">
    <input type="text" id="nome_fantasia" placeholder="Nome Fantasia">
    <input type="text" id="razao_social" placeholder="Razão Social">
</div>

<div class="section-title">Endereço</div>
<input type="text" id="cep" placeholder="CEP">
<input type="text" id="cidade" placeholder="Cidade">
<input type="text" id="estado" placeholder="Estado">
<input type="text" id="endereco" placeholder="Endereço completo">

<div class="section-title">Logo da Empresa</div>
<input type="file" id="logo_empresa" accept="image/*">
<div id="nomeLogo" class="logo-preview"></div>

<div class="section-title">Configurações</div>

<input type="text" id="subdominio" placeholder="Subdomínio">

<select id="plano_empresa">
    <option value="">Selecione um plano</option>
    <option value="1">Básico</option>
    <option value="2">Profissional</option>
    <option value="3">Premium</option>
</select>

<input type="number" id="vencimento" placeholder="Dia do vencimento">

<input type="text" id="prazo" placeholder="Prazo">

<select id="ativo">
    <option value="1">Ativo</option>
    <option value="0">Inativo</option>
</select>

<button onclick="salvarEmpresa()">Salvar Empresa</button>

</div>
</div>

<script>

// =======================
// LOGIN
// =======================
function obterUsuario(){
    return JSON.parse(localStorage.getItem("usuario"));
}

if(!obterUsuario()){
    window.location.href = "/login.html";
}

// =======================
// MODO EDIÇÃO
// =======================
const urlParams = new URLSearchParams(window.location.search);
const empresaId = urlParams.get("id");

// =======================
// TOGGLE PF / PJ
// =======================
document.querySelectorAll('input[name="tipo"]').forEach(radio => {
    radio.addEventListener("change", () => {
        const tipo = document.querySelector('input[name="tipo"]:checked').value;
        document.getElementById("boxFisica").style.display = tipo === "fisica" ? "block" : "none";
        document.getElementById("boxJuridica").style.display = tipo === "juridica" ? "block" : "none";
    });
});

// =======================
// PREVIEW LOGO
// =======================
document.getElementById("logo_empresa").addEventListener("change", function() {
    const file = this.files[0];

    if(file){
        document.getElementById("nomeLogo").innerHTML = `
            ${file.name}<br>
            <img src="${URL.createObjectURL(file)}">
        `;
    }
});


// =======================
// CARREGAR EMPRESA (EDITAR)
// =======================
async function carregarEmpresa(){
    if(!empresaId) return;

    document.getElementById("titulo").innerText = "Editar Empresa";

    try{
        const empresa = await fetchAuth(`/api/empresa/${empresaId}`);

        if(empresa.pessoa_fisica){
            document.querySelector('input[value="fisica"]').checked = true;
            document.getElementById("boxFisica").style.display = "block";
        } else {
            document.querySelector('input[value="juridica"]').checked = true;
            document.getElementById("boxJuridica").style.display = "block";
        }

        document.getElementById("cpf").value = empresa.cpf || "";
        document.getElementById("nome_completo").value = empresa.nome_completo || "";
        document.getElementById("nome_provedor").value = empresa.nome_provedor || "";

        document.getElementById("cnpj").value = empresa.cnpj || "";
        document.getElementById("nome_fantasia").value = empresa.nome_fantasia || "";
        document.getElementById("razao_social").value = empresa.razao_social || "";

        document.getElementById("cep").value = empresa.cep || "";
        document.getElementById("cidade").value = empresa.cidade || "";
        document.getElementById("estado").value = empresa.estado || "";
        document.getElementById("endereco").value = empresa.endereco || "";

        document.getElementById("subdominio").value = empresa.subdominio || "";
        document.getElementById("plano_empresa").value = empresa.plano_empresa || "";
        document.getElementById("vencimento").value = empresa.vencimento || "";
        document.getElementById("prazo").value = empresa.prazo || "";
        document.getElementById("ativo").value = empresa.ativo;

        if(empresa.logo){
            document.getElementById("nomeLogo").innerHTML = `
                <img src="/uploads/logos/${empresa.logo}">
            `;
        }

    }catch(err){
        console.error(err);
        alert("Erro ao carregar empresa");
    }
}

// =======================
// SALVAR
// =======================
async function salvarEmpresa(){

    const tipo = document.querySelector('input[name="tipo"]:checked')?.value;

    if(!tipo){
        alert("Selecione o tipo");
        return;
    }

    const formData = new FormData();

    formData.append("cpf", tipo === "fisica" ? document.getElementById("cpf").value : "");
    formData.append("nome_completo", tipo === "fisica" ? document.getElementById("nome_completo").value : "");
    formData.append("nome_provedor", tipo === "fisica" ? document.getElementById("nome_provedor").value : "");

    formData.append("cnpj", tipo === "juridica" ? document.getElementById("cnpj").value : "");
    formData.append("nome_fantasia", tipo === "juridica" ? document.getElementById("nome_fantasia").value : "");
    formData.append("razao_social", tipo === "juridica" ? document.getElementById("razao_social").value : "");

    formData.append("pessoa_fisica", tipo === "fisica" ? 1 : 0);
    formData.append("pessoa_juridica", tipo === "juridica" ? 1 : 0);

    formData.append("cep", document.getElementById("cep").value);
    formData.append("cidade", document.getElementById("cidade").value);
    formData.append("estado", document.getElementById("estado").value);
    formData.append("endereco", document.getElementById("endereco").value);

    formData.append("subdominio", document.getElementById("subdominio").value);
    formData.append("plano_empresa", document.getElementById("plano_empresa").value);
    formData.append("vencimento", document.getElementById("vencimento").value);
    formData.append("prazo", document.getElementById("prazo").value);
    formData.append("ativo", document.getElementById("ativo").value);

    const logoFile = document.getElementById("logo_empresa").files[0];
    if(logoFile){
        formData.append("logo", logoFile);
    }

    try{

        const url = empresaId ? `/api/empresa/${empresaId}` : "/api/empresa";
        const method = empresaId ? "PUT" : "POST";

        await fetchAuth(url, {
            method,
            body: formData
        });

        alert("Empresa salva com sucesso!");
        window.location.href = "/listar_empresas.html";

    }catch(err){
        console.error(err);
        alert("Erro ao salvar empresa");
    }
}

// INIT
window.addEventListener("DOMContentLoaded", ()=>{
    carregarEmpresa();
});

</script>

</body>
</html>

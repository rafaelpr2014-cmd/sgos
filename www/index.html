<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SGOS Técnico</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    background:#121212;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}
input,button{
    padding:12px;
    margin:10px;
    border-radius:8px;
    border:none;
    width:250px;
}
button{
    background:#00ff9c;
    font-weight:bold;
}
</style>

</head>
<body>

<h2>SGOS Técnico</h2>

<input id="empresa" placeholder="Digite sua empresa" />
<button onclick="entrar()">Entrar</button>

<script>
const empresaSalva = localStorage.getItem("empresa");

if(empresaSalva){
    redirecionar(empresaSalva);
}

function entrar(){
    const empresa = document.getElementById("empresa").value.trim().toLowerCase();

    if(!empresa){
        alert("Digite a empresa");
        return;
    }

    localStorage.setItem("empresa", empresa);
    redirecionar(empresa);
}

function redirecionar(empresa){
    const url = `https://${empresa}.sgos.net.br/tecnico.html`;
    window.location.href = url;
}
</script>

</body>
</html>
